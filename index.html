
<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RTJ Store - Jogos e Apps</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      margin: 0;
      padding: 0;
    }
    header {
      background: #1f1f1f;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }
    .notification {
      background: #ff9800;
      color: white;
      padding: 10px;
      text-align: center;
      font-size: 16px;
    }
    .search-bar {
      display: flex;
      justify-content: center;
      padding: 10px;
    }
    .search-bar input {
      width: 80%;
      padding: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #333;
      color: white;
    }
    .menu {
      display: flex;
      justify-content: space-around;
      background: #1f1f1f;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    .menu a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }
    .section-title {
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #90caf9;
    }
    .game-list {
      display: flex;
      overflow-x: scroll;
      padding: 10px;
    }
    .game-card {
      min-width: 150px;
      background: #1e1e1e;
      margin-right: 10px;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }
    .game-card img {
      width: 100px;
      height: 100px;
      border-radius: 10px;
    }
    .game-card h2 {
      font-size: 14px;
      margin: 5px 0;
    }
    .game-card p {
      font-size: 12px;
      color: #bbb;
    }
    .game-card a {
      display: block;
      margin-top: 10px;
      padding: 5px;
      background: #2196f3;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <header>
    RTJ Store - Jogos e Apps
  </header>
  <div class="notification">
    🔥 Novos jogos e destaques da semana! Confira agora! 🔥
  </div>
  <div class="search-bar">
    <input type="text" placeholder="Procurar jogos e apps...">
  </div>
  <div class="section-title">Destaques</div>
  <div class="game-list">
    <div class="game-card">
      <img src="https://i.imgur.com/Zr1bUqf.png" alt="Game">
      <h2>Zona Morta</h2>
      <p>Jogo de sobrevivência zumbi.</p>
      <a href="#">Baixar</a>
    </div>
    <div class="game-card">
      <img src="https://i.imgur.com/abc123.png" alt="Game">
      <h2>Aventura Pixel</h2>
      <p>Explore um mundo 8-bit cheio de desafios.</p>
      <a href="#">Baixar</a>
    </div>
    <div class="game-card">
      <img src="https://i.imgur.com/xyz789.png" alt="Game">
      <h2>Corrida Extrema</h2>
      <p>Velocidade e adrenalina sem limites.</p>
      <a href="#">Baixar</a>
    </div>
  </div>
  <div class="menu">
    <a href="#">Jogos</a>
    <a href="#">Apps</a>
    <a href="#">Pesquisa</a>
    <a href="#">Livros</a>
  </div>
</body>
</html>
